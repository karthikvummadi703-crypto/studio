[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/ecopulse run build"

[deploy]
startCommand = "npx serve -s artifacts/ecopulse/dist/public -l $PORT --no-clipboard"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/"
healthcheckTimeout = 30

[environments.production.variables]
NODE_ENV = "production"
BASE_PATH = "/"
