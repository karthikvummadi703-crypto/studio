kind = "web"
previewPath = "/"
title = "EcoPulse AI"
version = "1.0.0"
id = "artifacts/ecopulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21483

[services.development]
run = "pnpm --filter @workspace/ecopulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecopulse", "run", "build" ]
publicDir = "artifacts/ecopulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21483"
BASE_PATH = "/"
